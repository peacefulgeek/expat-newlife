services:
  - type: web
    name: expat-newlife
    runtime: node
    repo: https://github.com/peacefulgeek/expat-newlife
    branch: main
    buildCommand: npm install -g pnpm@10 && pnpm install --frozen-lockfile && pnpm build
    startCommand: node scripts/start-with-cron.mjs
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Optional: add your own OpenAI key for AI article generation cron
      # - key: OPENAI_API_KEY
      #   value: your-key-here
