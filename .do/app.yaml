name: expat-newlife
region: nyc
services:
  - name: web
    github:
      repo: peacefulgeek/expat-newlife
      branch: main
      deploy_on_push: true
    build_command: pnpm install --frozen-lockfile && pnpm build
    run_command: NODE_ENV=production node scripts/start-with-cron.mjs
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    http_port: 8080
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 60
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: SITE_URL
        value: "https://expatnewlife.com"
      - key: SITE_HOST
        value: "expatnewlife.com"
      - key: AUTO_GEN_ENABLED
        value: "true"
      - key: OPENAI_API_KEY
        value: "SET_IN_DIGITALOCEAN_DASHBOARD"
        type: SECRET
      - key: OPENAI_BASE_URL
        value: "https://api.deepseek.com"
      - key: OPENAI_MODEL
        value: "deepseek-chat"
      - key: GH_PAT
        value: "SET_IN_DIGITALOCEAN_DASHBOARD"
        type: SECRET
      - key: AMAZON_TAG
        value: "spankyspinola-20"
