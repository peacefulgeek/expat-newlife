name: moving-abroad
region: nyc
services:
  - name: web
    github:
      repo: YOUR_GITHUB_USERNAME/moving-abroad
      branch: main
      deploy_on_push: true
    build_command: pnpm install --frozen-lockfile && pnpm build
    run_command: NODE_ENV=production node scripts/start-with-cron.mjs
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    http_port: 3000
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 60
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: AUTO_GEN_ENABLED
        value: "true"
      - key: DATABASE_URL
        value: ""
        type: SECRET
      - key: OPENAI_API_KEY
        value: ""
        type: SECRET
      - key: OPENAI_BASE_URL
        value: "https://api.deepseek.com"
      - key: OPENAI_MODEL
        value: "deepseek-chat"
      - key: GH_PAT
        value: ""
        type: SECRET
      - key: AMAZON_TAG
        value: "spankyspinola-20"
